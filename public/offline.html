<!doctype html>
<html lang="en">
  <head>

    <title>You're offline — Visa Tracker</title>
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;

        background: #ffffff;
        color: #171717;
        text-align: center;

        border: 1px solid #d4d4d4;

        color: #ffffff;
        cursor: pointer;
      }

    <div class="card">
      <h1>You're offline</h1>
      <p>Visa Tracker needs an internet connection for this page.</p>
