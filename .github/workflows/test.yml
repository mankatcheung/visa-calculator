name: Test
on: [push]
# Cancel older in-progress runs on the same branch -- saves CI time/cost
# when pushing several commits in quick succession.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
# Centralize environment variables
env:
  NODE_VERSION: '22.x'
  # e2e-tests and lighthouse build/run Next.js in production mode
  # (`next build`/`next start` force NODE_ENV=production), which requires
  # a trusted APP_URL to be configured -- see config.ts.
  APP_URL: http://localhost:3000

permissions:
  contents: read
jobs:
  # Job for linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile
      - name: Run lint
        run: yarn run lint

  # Job for unit tests and coverage
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile
      - name: Run tests with coverage
        run: yarn run coverage
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Job for E2E tests against a local sqlite file instead of an ephemeral
  # Turso database. Replaced the old Turso-based setup, which needed several
  # rounds of flakiness hardening (502s on freshly-created DBs, a
  # delete/create race) and didn't work at all on Dependabot-triggered runs
  # (no secrets access) -- validated across 3 independent CI runs before
  # switching over, see PR #20.
  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile
      - name: Install Cypress binary
        run: npx cypress install
      - name: Run database migrations
        run: yarn db:migrate
        env:
          NODE_ENV: test
      - name: Build Next.js project
        run: yarn build
      - name: Start Next.js project
        run: yarn start > nextjs.log 2>&1 &
      - name: Wait for Next.js to be ready
        run:
          npx wait-on http://localhost:3000 --timeout 60000 --verbose || (cat
          nextjs.log && exit 1)
      - name: Debug server availability
        run: curl -v http://localhost:3000 || echo "Server not responding"
      - name: Run Cypress E2E tests
        run: yarn cy:run
      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots/
            cypress/videos/
            nextjs.log
          retention-days: 7

  # Job for Lighthouse CI performance/accessibility/best-practices/SEO budgets.
  # Scans the public sign-in/sign-up pages (no auth needed) plus the
  # dashboard/leaves/settings pages, which lighthouse-auth-script.js signs
  # into freshly via Puppeteer before each authenticated audit. The local
  # sqlite fallback (no DATABASE_URL) needs its schema migrated first so
  # those sign-ups actually have a users/user_settings table to write to.
  lighthouse:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile
      - name: Run database migrations
        run: yarn db:migrate
        env:
          NODE_ENV: test
      - name: Build Next.js project
        run: yarn build
      - name: Run Lighthouse CI (public pages)
        run: npx lhci autorun
      - name: Run Lighthouse CI (authenticated pages)
        run: npx lhci autorun --config=lighthouserc.authenticated.js
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 7
